</head>

<a href="movimentacoes.html">

            <div class="sidebar-footer">

    <button class="btn-logout" id="btnLogout">

        <i class="fa-solid fa-right-from-bracket"></i>

        Sair

    </button>

</div>

        </aside>

        <main class="content">

            <header class="topbar">
                <div>
                    <h1>Configurações</h1>
                    <p>Defina os dados da pousada e preferências do sistema.</p>
                </div>
            </header>

            <section class="settings-grid">

                <div class="settings-card">

                    <div class="section-title">
                        <h2>Dados da Pousada</h2>
                    </div>

                    <form id="formConfiguracoes" class="form">

                        <div class="form-group">
                            <label for="nomePousada">Nome da pousada</label>
                            <input type="text" id="nomePousada" placeholder="Ex: Pousada Sol Nascente">
                        </div>

                        <div class="form-group">
                            <label for="cnpjPousada">CNPJ</label>
                            <input type="text" id="cnpjPousada" placeholder="00.000.000/0000-00">
                        </div>

                        <div class="form-group">
                            <label for="telefonePousada">Telefone</label>
                            <input type="text" id="telefonePousada" placeholder="(00) 00000-0000">
                        </div>

                        <div class="form-group">
                            <label for="enderecoPousada">Endereço</label>
                            <input type="text" id="enderecoPousada" placeholder="Rua, número, bairro, cidade">
                        </div>

                        <button type="submit" class="btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Salvar Configurações
                        </button>

                    </form>

                </div>

                <div class="settings-card">

                    <div class="section-title">
                        <h2>Preferências</h2>
                    </div>

                    <form id="formPreferencias" class="form">

                        <div class="form-group">
                            <label for="valorHoraPadrao">Valor padrão por hora</label>
                            <input type="number" id="valorHoraPadrao" min="0" step="0.01" placeholder="Ex: 25">
                        </div>

                        <div class="form-group">
                            <label for="tempoMinimo">Tempo mínimo cobrado</label>
                            <select id="tempoMinimo">
                                <option value="1">1 hora</option>
                                <option value="2">2 horas</option>
                                <option value="3">3 horas</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="moedaSistema">Moeda</label>
                            <select id="moedaSistema">
                                <option value="BRL">Real Brasileiro (R$)</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-primary">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Salvar Preferências
                        </button>

                    </form>

                </div>

            </section>

        </main>

    </div>

    <script src="js/global.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/configuracoes.js"></script>

</body>
